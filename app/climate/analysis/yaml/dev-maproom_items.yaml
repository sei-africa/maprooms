title: 
    en: Climate Analysis
    fr: Analyse Climatique
description: 
    en: Historical, current and forecast climate conditions around the country.
    fr: Conditions climatiques historiques, courantes et prévues dans le pays.
type: navigation-page
# icon_function defined in /app/climate/analysis/scripts/icons.py
icon_function: icon_monthly_analysis
# icon_image from /app/static/images/card_icons
# icon_image: default-emi_climate.gif

## - daily: name of the html file under templates (ex: daily.html)
## and the yaml file under yaml folder (ex: daily.yaml)
maprooms:
    - daily:
        title:
            en: Daily Climate Analysis
            fr: Analyse Climatique Journalières
        description:
            en: The Maproom explores historical daily precipitation and temperatures by calculating simple seasonal statistics and the history of extreme.
            fr: Le Maproom explore les précipitations et températures journalières en calculant de simple statistiques saisonniers et des extrêmes historiques.
        # icon_function defined in /app/climate/analysis/scripts/icons.py
        icon_function: icon_daily_analysis
        # icon_image from /app/climate/analysis/static/images
        # icon_image: default-emi_daily.png
    - dekadal:
        title:
            en: Dekad Climate Analysis
            fr: Analyse Climatique Décadaire
        description:
            en: This interface allows users to view rainfall, maximum, minimum and mean temperature dekadal climatologies and seasonal anomalies.
            fr: Cette interface permet à l'utilisateur de visualiser les climatologies décadaires et les anomalies saisonnières de précipitations et des températures.
        icon_function: icon_dekadal_analysis
    - monthly:
        title:
            en: Monthly Climate Analysis
            fr: Analyse Climatique Mensuelle
        description:
            en: This interface allows users to view rainfall, maximum, minimum and mean temperature monthly climatologies and seasonal anomalies.
            fr: Cette interface permet à l'utilisateur de visualiser les climatologies mensuelles et les anomalies saisonnières de précipitations et des températures.
        icon_function: icon_monthly_analysis
    - seasonal:
        title:
            en: Seasonal Climate Analysis
            fr: Analyse Climatique Saisonnière
        description:
            en: This interface allows users to view rainfall, maximum and minimum temperature seasonal climatologies, anomalies and probability of exceedance.
            fr: Cette interface permet à l'utilisateur de visualiser les climatologies et les anomalies saisonnières de précipitations et des températures ainsi que la probabilité de dépassement d'un seuil donné.
        # icon_image from /app/climate/analysis/static/images
        icon_image: default-emi_seasonal.gif
    - teleconnections:
        title:
            en: Climate Teleconnections
            fr: Climate Teleconnections
        description:
            en: Teleconnections refer to the covariation of remote regional climates, either simultaneously or with time lags, influenced by atmospheric waves generated by perturbations in thermal and kinematic fields. These interactions can give rise to complex climate variations across different spatial and temporal scales.
            fr: Teleconnections refer to the covariation of remote regional climates, either simultaneously or with time lags, influenced by atmospheric waves generated by perturbations in thermal and kinematic fields. These interactions can give rise to complex climate variations across different spatial and temporal scales.
        # icon_image from /app/climate/analysis/static/images
        icon_image: default-emi_teleconnections.gif

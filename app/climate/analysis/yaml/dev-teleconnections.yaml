description:
    en: |
        <h4>Climate Teleconnections</h4>
        <p>
        Teleconnections refer to the covariation of remote regional climates, either simultaneously or with time lags, influenced by atmospheric waves generated by perturbations in thermal and kinematic fields. These interactions can give rise to complex climate variations across different spatial and temporal scales.
        <br>
        Rainfall time series and temperature time series (1981-2026) reconstructed from station observations, remote sensing and other proxies.
        </p>
    fr: |
        <h4>Téléconnexions Climatiques</h4>
        <p>
        Les téléconnexions désignent la covariation de climats régionaux éloignés, simultanée ou décalée dans le temps, sous l'influence d'ondes atmosphériques générées par des perturbations des champs thermiques et cinématiques. Ces interactions peuvent engendrer des variations climatiques complexes à différentes échelles spatiales et temporelles.
        <br>
        Séries temporelles de précipitations et de température (1981-2026) reconstruites à partir de données in-situ et de données de télédétection et autres proxy.
        </p>

dataset:
    rainfall: ALL
    temperature: ALL
    varid:
        rainfall: [precip]
        temperature: [tmin, tmax]
    timeres: dekadal

variables:
    label:
        en: Variable
        fr: Variable
    select:
        rainfall:
            en: Rainfall
            fr: Précipitation
        temperature:
            en: Temperature
            fr: Température
clim_variables:
    rainfall:
        precip:
            en: Total rainfall
            fr: Cumul de précipitation
    temperature:
        tmax:
            en: Maximum temperature
            fr: Température maximale
        tmean:
            en: Mean temperature
            fr: Température moyenne
        tmin:
            en: Minimum temperature
            fr: Température minimale

dataset_enso:
    oni:
        oni:
            table: enso_oni_cpc
        roni:
            table: enso_roni_cpc
    anom:
        weekly:
            oisstv21_cpc:
                table: enso_oisstv21_cpc_weekly
                anomaly: [anom_nino1+2, anom_nino3, anom_nino4, anom_nino3.4, ranom_nino1+2, ranom_nino3, ranom_nino4, ranom_nino3.4]
        monthly:
            oisstv21_cpc:
                table: enso_oisstv21_cpc_monthly
                anomaly: [anom_nino1+2, anom_nino3, anom_nino4, anom_nino3.4, ranom_nino1+2, ranom_nino3, ranom_nino4, ranom_nino3.4]
            ersstv5_cpc:
                table: enso_ersstv5_cpc_monthly
                anomaly: [anom_nino1+2, anom_nino3, anom_nino4, anom_nino3.4, ranom_nino3.4]
            ersstv5_ncei:
                table: enso_ersstv5_ncei_monthly
                anomaly: [anom_nino3, anom_nino4, anom_nino3.4, anom_nino1+2]
            ersstv6_ncei:
                table: enso_ersstv6_ncei_monthly
                anomaly: [anom_nino3, anom_nino4, anom_nino3.4, anom_nino1+2]
    iod:
        ersstv5_ncei:
            table: iod_ersstv5_ncei_monthly
        ersstv6_ncei:
            table: iod_ersstv6_ncei_monthly
    nao:
        cdas_cpc:
            table: nao_cdas_cpc_monthly

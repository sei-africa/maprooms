description:
    en: |
        <h4>Climate Teleconnections</h4>
        <p>
        Teleconnections refer to the covariation of remote regional climates, either simultaneously or with time lags, influenced by atmospheric waves generated by perturbations in thermal and kinematic fields. These interactions can give rise to complex climate variations across different spatial and temporal scales.
        <br>
        Rainfall time series and temperature time series (1981-2026) reconstructed from station observations, remote sensing and other proxies.
        </p>
    fr: |
        <h4>Téléconnexions Climatiques</h4>
        <p>
        Les téléconnexions désignent la covariation de climats régionaux éloignés, simultanée ou décalée dans le temps, sous l'influence d'ondes atmosphériques générées par des perturbations des champs thermiques et cinématiques. Ces interactions peuvent engendrer des variations climatiques complexes à différentes échelles spatiales et temporelles.
        <br>
        Séries temporelles de précipitations et de température (1981-2026) reconstruites à partir de données in-situ et de données de télédétection et autres proxy.
        </p>
dataset:
    rainfall: ALL
    temperature: ALL
    varid:
        rainfall: [precip]
        temperature: [tmin, tmax]
variables:
    label:
        en: Variable
        fr: Variable
    select:
        rainfall:
            en: Rainfall
            fr: Précipitation
        temperature:
            en: Temperature
            fr: Température

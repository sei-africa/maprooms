description:
    en: |
        <h4>Seasonal Climate Analysis</h4>
        <p>
        This interface allows users to view rainfall, maximum, minimum and mean temperature seasonal climatologies, anomalies and probability of exceedance.
        Rainfall time series and temperature time series (1981-2021) reconstructed from station observations, remote sensing and other proxies.
        </p>
    fr: |
        <h4>Analyse Climatique Saisonnière</h4>
        <p>
        Cette interface permet à l'utilisateur de visualiser les climatologies et les anomalies saisonnières de précipitations et des températures ainsi que la probabilité de dépassement d'un seuil donné.
        Séries temporelles de précipitations et de température (1981-2021) reconstruites à partir de données in-situ et de données de télédétection et autres proxy.
        </p>

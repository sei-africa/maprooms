<div class="container d-flex flex-wrap justify-content-start w-100" id="monthly-raw-control">
    <fieldset class="border border-secondary rounded-3 py-1">
        <legend class="legend-label">{{ pageText.variables.label }}</legend>
        <select id="monthly-chart-raw-variable" class="form-select monthly-raw-select2" style="width: 200px;">
            {% for key, value in pageText.variables.select.items() %}
            <option value="{{key}}">{{value}}</option>
            {% endfor %}
        </select>
    </fieldset>
    <fieldset class="border border-secondary rounded-3 py-1">
        <legend class="legend-label">{{ pageText.monthly_ts_raw.label_date.start }}</legend>
        <div id="monthly-chart-raw-startdate" style="width: 6.5em">
            <input id="monthly-chart-raw-startdate-calendar" type="text" class="form-control">
        </div>
    </fieldset>
    <fieldset class="border border-secondary rounded-3 py-1">
        <legend class="legend-label">{{ pageText.monthly_ts_raw.label_date.end }}</legend>
        <div id="monthly-chart-raw-enddate" style="width: 6.5em">
            <input id="monthly-chart-raw-enddate-calendar" type="text" class="form-control">
        </div>
    </fieldset>
    <fieldset class="border border-secondary rounded-3 py-1">
        <legend class="legend-label">{{ pageText.monthly_ts_raw.label_series }}</legend>
        <select id="monthly-chart-raw-series" class="form-select monthly-raw-select2" style="width: 150px;">
            {% for key, value in pageText.monthly_ts_raw.series.items() %}
            <option value="{{key}}">{{value}}</option>
            {% endfor %}
        </select>
    </fieldset>
    <fieldset id="monthly-chart-raw-startmonth-list" class="border border-secondary rounded-3 py-1" style="display: none;">
        <legend class="legend-label">{{ pageText.monthly_ts_raw.start_mon }}</legend>
        <div id="monthly-chart-raw-startmonth" style="width: 120px;"></div>
    </fieldset>
</div>

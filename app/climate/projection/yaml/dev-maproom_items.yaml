title: 
    en: Climate Projection
    fr: Projection Climatique
description: 
    en: Future changes in seasonal climate with reference to a historical climatological period. Climatological period is user defined and is same in both historical and future periods. Future projections are based on the representative concentration pathways (RCPs).
    fr: Future changes in seasonal climate with reference to a historical climatological period. Climatological period is user defined and is same in both historical and future periods. Future projections are based on the representative concentration pathways (RCPs).
type: navigation-page
# icon_function defined in /app/climate/projection/scripts/icons.py
# icon_function: icon_climate_projection
# icon_image from /app/static/images/card_icons
icon_image: default-emi_projection.gif

maprooms:
    - spi-monthly:
        title:
            en: Monthly SPI
            fr: Monthly SPI
        description:
            en: The Standardized Precipitation Index is an indicator of extreme rainfall events, whether they are drought or excess rainfall.
            fr: The Standardized Precipitation Index is an indicator of extreme rainfall events, whether they are drought or excess rainfall.
        icon_image: default-emi_icon_projection.gif
    - seasonal-change:
        title:
            en: Seasonal Changes
            fr: Seasonal Changes
        description:
            en: Future changes in seasonal climate with reference to a historical climatological period. Climatological period is user defined and is same in both historical and future periods. Future projections are based on the representative concentration pathways (RCPs).
            fr: Future changes in seasonal climate with reference to a historical climatological period. Climatological period is user defined and is same in both historical and future periods. Future projections are based on the representative concentration pathways (RCPs).
        icon_image: default-emi_icon_projection.gif
    - model-agreement:
        title:
            en: Model Agreement
            fr: Model Agreement
        description:
            en: The level of agreement on either positive or negative change in a future time period with reference to the baseline (historical period).
            fr: The level of agreement on either positive or negative change in a future time period with reference to the baseline (historical period).
        icon_image: default-emi_icon_projection.gif

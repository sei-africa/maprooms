<div class="modal fade" id="loginModal" data-bs-backdrop="static" data-bs-keyboard="false" tabindex="-1" aria-hidden="true">
    <div class="vertical-alignment-helper">
        <div class="modal-dialog modal-dialog-centered vertical-align-center">
            <div class="modal-content">
                <div class="modal-header">
                    <h4 class="modal-title">User Login</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body">
                    <!-- <form action="/login" method="post" role="form"> -->
                    <form action="{{ url_for('auth.loginUser') }}" method="post" role="form">
                        <div class="form-group">
                            <input type="text" class="form-control" placeholder="Username" name="username" required="required" value="{{request.form.username}}">
                        </div>
                        <div class="form-group">
                            <input type="password" class="form-control" placeholder="Password" name="password" required="required" value="{{request.form.password}}" autocomplete="off">
                        </div>
                        <div class="form-group" style="text-align: center;">
                            <button id="btn-submit-login" type="submit" class="btn btn-primary">Log in</button>
                        </div>
                        <div class="clearfix">
                            <label class="float-start checkbox-inline">
                                <input type="checkbox" name="remember"> Remember me
                            </label>
                            <!-- <a href="/forgot_password" class="float-end">Forgot Password?</a> -->
                            <a href="{{ url_for('auth.forgot_password') }}" class="float-end">Forgot Password?</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>

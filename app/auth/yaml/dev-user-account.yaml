tab_content:
  points:
    title:
      en: User multiple points files list
      fr: Liste des fichiers points multiples utilisateur
    type:
      en: File name
      fr: Nom de fichier
    add_file:
      en: Add new multiple points file
      fr: Ajouter un nouveau fichier points multiples
    instruction:
      en: |
          <p>The file containing the multiple points must be in CSV format (Comma-separated values). The data must have 3 columns and the first row must be a header.
          <ul>
          <li>The 1st column may be the name of the locations or ID of stations</li>
          <li>The 2nd column must be the longitude</li>
          <li>The 3rd column must be the latitude</li>
          </ul></p>
          <h5>Example</h5>
      fr: |
          <p>Le fichier contenant les points multiples doit être au format CSV (valeurs séparées par des virgules). Les données doivent comporter trois colonnes et la première ligne doit être un en-tête.
          <ul>
          <li>La 1ère colonne peut être le nom des emplacements ou l'identifiant des stations</li>
          <li>La 2ème colonne doit être la longitude</li>
          <li>La 3ème colonne doit être la latitude</li>
          </ul></p>
          <h5>Exemple</h5>
  shp:
    title:
      en: User shapefiles list
      fr: Liste des fichiers shapefiles utilisateur
    type:
      en: Layer name
      fr: Nom de la couche
    add_file:
      en: Add new shapefile
      fr: Ajouter un nouveau shapefile
    instruction:
      en: |
          <p>The shapefile must consist of the 4 files with file names extensions: <strong>.shp</strong>, <strong>.shx</strong>, <strong>.dbf</strong> and <strong>.prj</strong>. The shapefile's coordinate system must be EPSG:4326 (WGS84).</p>
          <h5>Example</h5>
      fr: |
          <p>Le shapefile doit être composé de 4 fichiers avec des extensions de noms de fichiers: <strong>.shp</strong>, <strong>.shx</strong>, <strong>.dbf</strong> et <strong>.prj</strong>. Le système de coordonnées du shapefile doit être EPSG:4326 (WGS84).</p>
          <h5>Exemple</h5>
  geojs:
    title:
      en: User GeoJSON files list
      fr: Liste des fichiers GeoJSON utilisateur
    type:
      en: File name
      fr: Nom de fichier
    add_file:
      en: Add new GeoJSON file
      fr: Ajouter un nouveau fichier GeoJSON
    instruction:
      en: |
          <p>The coordinate of the GeoJSON must be EPSG:4326 (WGS84). The geometry types should be <strong>Point</strong>, <strong>Polygon</strong> or <strong>MultiPolygon</strong>. You can have one or multiple geometry types in one file.</p>
          <p>The data structures are as follow </p>
      fr: |
          <p>Les coordonnées du GeoJSON doivent être EPSG:4326 (WGS84). Les types de géométrie doivent être <strong>Point</strong>, <strong>Polygon</strong> ou <strong>MultiPolygon</strong>. Vous pouvez avoir un ou plusieurs types de géométrie dans un fichier.</p>
          <p>The data structures are as follow </p>

title: 
    en: Projection
    fr: Projection
description: 
    en: Future changes in seasonal climate with reference to a historical climatological period. Climatological period is user defined and is same in both historical and future periods. Future projections are based on the representative concentration pathways (RCPs).
    fr: Évolution future du climat saisonnier par rapport à une période climatologique historique. Cette période, définie par l'utilisateur, est identique pour les périodes passées et futures. Les projections futures sont basées sur les scénarios de concentration représentatifs (RCP).
type: navigation-page
# icon_function: icon_climate_projection
icon_image: emi_projection.gif


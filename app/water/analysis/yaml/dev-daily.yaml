description:
    en: |
        <h4>Seasonal Climate Analysis</h4>
        <p>
        The Maproom explores historical daily precipitation and temperatures by calculating simple seasonal statistics and the history of extreme.
        Rainfall time series and temperature time series (1981-2021) reconstructed from station observations, remote sensing and other proxies.
        </p>
    fr: |
        <h4>Analyse Climatique Journalières</h4>
        <p>
        Le Maproom explore les précipitations et températures journalières en calculant de simple statistiques saisonniers et des extrêmes historiques.
        Séries temporelles de précipitations et de température (1981-2021) reconstruites à partir de données in-situ et de données de télédétection et autres proxy.
        </p>

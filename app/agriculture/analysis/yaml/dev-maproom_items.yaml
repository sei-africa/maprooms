title: 
    en: Historical Analysis
    fr: Analyse Historique
description: 
    en: The Maproom explores historical rainy season onset date based on user-defined definitions. The date when the rainy season starts is critical to agriculture planification, in particular for planting.
    fr: Cette Maproom explore l'historique de la date de début de la saison des pluies, basée sur une définition explicitée par l'utilisateur. Cette date est critique pour la planification de la campagne agricole, en particulier pour semer.
type: navigation-page

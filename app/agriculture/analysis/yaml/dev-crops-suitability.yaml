description:
    en: |
        <h4>Climate Suitability for Crops</h4>
        <p>
        Maproom to explore crop climate suitability using a spatial overlay analysis. 
        The output is an index from 0-5 where 5 meet all conditions and is the most suitable.
        </p>
    fr: |
        <h4>Adéquation Climatique pour les Cultures</h4>
        <p>
        Maproom permettant d'évaluer l'adéquation climatique des cultures à l'aide d'une analyse par superposition spatiale. 
        Le résultat est un indice allant de 0 à 5, où la valeur 5 correspond à une adéquation optimale (satisfaction de toutes les conditions).
        </p>

default_values:
    precip_low: 500.
    precip_high: 700.
    temp_low: 10.
    temp_high: 25.
    temp_optim: 15.
    nb_wetdays: 60
    rain_thres: 1.

dataset:
    use: ALL
    variables:
        suitability: [precip]
        rainfall: [precip]
        tempMax: [tmax]
        tempMin: [tmin]

variables:
    label:
        en: Variable
        fr: Variable
    select:
        suitability:
            en: Crop climate suitability
            fr: Adéquation climatique des cultures
        rainfall:

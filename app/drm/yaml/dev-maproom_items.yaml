            fr: The Standardized Precipitation Index is an indicator of extreme rainfall events, whether they are drought or excess rainfall.
        # icon_image from /app/drm/static/images
        icon_image: default-emi_spi.gif
    - ext_rainfall:
        title:
            en: Extreme Rainfall Analysis
            fr: Extreme Rainfall Analysis

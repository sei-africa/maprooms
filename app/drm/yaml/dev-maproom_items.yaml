            fr: The Maproom facilitates the exploration of the history of extreme monthly and seasonal rainfall characteristics.
        # icon_image from /app/drm/static/images
        icon_image: default-emi_extrainfall.gif
    - ext_temperature:
        title:
            en: Extreme Temperature Analysis
            fr: Extreme Temperature Analysis
        description:
            en: The Maproom facilitates the exploration of the history of extreme monthly and seasonal minimum and maximum temperatures.
            fr: The Maproom facilitates the exploration of the history of extreme monthly and seasonal minimum and maximum temperatures.
        # icon_image from /app/drm/static/images
        icon_image: default-emi_exttemp.gif
